<html layout:decorate="~{layout_page}">
<head>
  <style>
      #matListTb input, #matListTb textarea {
          width: 100px;
          height: 40px;
      }
  </style>
</head>
<th:block layout:fragment="content">

  <div class="layout-contents">
    <div class="page-title-wrap">
      <div class="left">
        <h2>수주견적 등록</h2>
        <a title="북마크" class="bookmark toggle">내 메뉴</a>
      </div>
      <ul class="page-navi">
        <li><img src="/images/icon/ico-nav-home.svg" alt="홈아이콘"></li>
        <li>영업 관리</li>
        <li>수주견적 등록</li>
      </ul>
    </div>

    <section class="section">
      <div class="section-top">
        <div class="search-wrap">
          <dl>
            <dt>
              <label for="cboDateKind">검색 구분<span class="eq"></span></label>
            </dt>
            <dd>
              <div class="srch-box">
                <!-- ★ 수주일 → 견적일 (value는 기존 'sales' 그대로) -->
                <select id="cboDateKind" name="cboDateKind">
                  <option value="sales">견적일</option>
                  <option value="delivery">납기일</option>
                </select>
              </div>
            </dd>
          </dl>
          <dl>
            <dt>조회기간<span class="eq">*</span></dt>
            <dd>
              <ul class="date-box">
                <li>
                  <input type="date" id="srchStartDt" name="srchStartDt">
                  <label for="srchStartDt" class="hide">시작일</label>
                </li>
                <li>
                  <input type="date" id="srchEndDt" name="srchEndDt">
                  <label for="srchEndDt" class="hide">종료일</label>
                </li>
              </ul>
            </dd>
          </dl>
          <dl>
            <dt>&nbsp;</dt>
            <dd>
              <li>
                <a class="btn btn-delete" title="검색" id="btnSearch">
                  <img src="/images/icon/btn-srch.svg" alt="검색 아이콘">
                  검색
                </a>
              </li>
            </dd>
          </dl>
        </div>
        <div class="button-wrap">
          <ul>
            <li>
              <a class="btn btn-excell" title="등록" id="btnAddNew">
                <img src="/images/icon/ico-plus.svg" alt="등록 아이콘">
                등록
              </a>
            </li>
            <li>
              <a class="btn btn-delete" title="삭제" id="btnDelete">
                <img src="/images/icon/ico-delete.svg" alt="삭제 아이콘">
                삭제
              </a>
            </li>
            <li>
              <a class="btn btn-edit" title="수정" id="btnEdit">
                <img src="/images/icon/ico-edit.svg" alt="수정 아이콘">
                수정
              </a>
            </li>
          </ul>
        </div>
      </div>
      <div class="container-fluid">
        <div id="theGrid" style="height: 730px;"></div>
      </div>
    </section>
  </div>

  <!-- ===================== 견적 등록/수정 팝업 템플릿 ===================== -->
  <script type="text/x-tmpl" id="sujuTemplate">
    <style>
        .item-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            margin-top: 10px;
        }
        .item-table th {
            background-color: #EDEFF5;
            text-align: center;
            font-weight: bold;
            padding: 8px;
            border: 1px solid #ccc;
        }
        .item-table td {
            padding: 6px;
            text-align: center;
            border: 1px solid #ccc;
        }
        .item-table input {
            width: 100%;
            box-sizing: border-box;
            padding: 4px;
        }
        .item-table td:first-child,
        .item-table td:nth-child(6) { text-align: left; }
        .item-table .btn.in_btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 32px; height: 32px;
            border-radius: 4px; padding: 0;
            border: 1px solid #B3B3B3;
            background-color: #fff;
            cursor: pointer;
            transition: background-color 0.2s;
            line-height: 0;
        }
        .item-table .btn.in_btn.plus img { width: 10px; height: 10px; display: block; }
        .item-table .btn.in_btn img      { width: 12px; height: 12px; display: block; margin-right: 5px; }
        .input-with-button { display: flex; gap: 4px; align-items: center; }
        .input-with-button input       { flex: 1; min-width: 0; padding: 4px; }
        .input-with-button .btn.in_btn { flex-shrink: 0; }
        .content_wrap.popup { display: flex; flex-direction: column; height: 100%; }
        .table-wrap         { flex: 1; overflow-y: auto; padding-right: 5px; }
        .popup-button       { flex-shrink: 0; padding: 10px; background: #fff; border-top: 1px solid #ddd; }
        .input-with-checkbox { display: flex; align-items: center; gap: 6px; }
        .input-with-checkbox input[type="number"]   { flex: 1; min-width: 0; padding: 4px; }
        .input-with-checkbox input[type="checkbox"] { flex-shrink: 0; width: 18px; height: 18px; }
    </style>

    <div class="content_wrap popup" id="div_excel_upload">
        <div class="table-wrap">
            <form id="sujuForm">
                <table class="write-table">
                    <caption>견적등록 테이블</caption>
                    <input type="hidden" id="id" name="id">
                    <tbody>
                        <tr>
                            <!-- ★ 수주일 → 견적일 (필드명 JumunDate 그대로 유지) -->
                            <th style="text-align:center"><label for="JumunDate">견적일*</label></th>
                            <td><input type="date" id="JumunDate" name="JumunDate"></td>
                            <th style="text-align:center"><label for="DueDate">납기일*</label></th>
                            <td><input type="date" id="DueDate" name="DueDate"></td>
                        </tr>
                        <tr>
                            <th style="text-align:center"><label for="cboCompany">판매처*</label></th>
                            <td colspan="3">
                                <input id="cboCompany" name="Company_id" type="hidden">
                                <input class="form-control2" type="text" id="CompanyName" name="CompanyName"
                                    placeholder="판매처 검색 버튼을 클릭하여 판매처를 검색하세요" readonly/>
                                &nbsp;
                                <a class="btn btn-delete" title="검색" id="btnCompanySearch">
                                    <img src="/images/icon/btn-srch.svg" alt="검색 아이콘">
                                    판매처 검색
                                </a>
                            </td>
                        </tr>
                        <!-- ★ 수주구분 select 제거 → hidden으로 'estimate' 고정 -->
                        <input type="hidden" id="cboSujuType" name="SujuType" value="estimate">
                        <tr>
                            <th style="text-align:center"><label for="Description">비고</label></th>
                            <td colspan="3">
                                <textarea id="Description" name="Description" style="height:40px;"></textarea>
                            </td>
                        </tr>
                        <tr>
                            <th style="text-align:center"><label for="StateName">상태</label></th>
                            <td><input type="text" id="StateName" name="StateName" readonly disabled></td>
                            <th style="text-align:center"><label for="totalAmountSum">총액</label></th>
                            <td><input id="totalAmountSum" name="totalAmountSum" style="text-align:right;" readonly></td>
                        </tr>
                    </tbody>
                </table>

                <table class="item-table">
                    <colgroup>
                        <col style="width: 6%">
                        <col style="width: 28%">
                        <col style="width: 6%">
                        <col style="width: 13%">
                        <col style="width: 9%">
                        <col style="width: 9%">
                        <col style="width: 9%">
                        <col style="width: 11%">
                        <col style="width: 5%">
                        <col style="width: 4%">
                    </colgroup>
                    <thead>
                        <tr id="itemHeaderRow">
                            <th>코드</th>
                            <th>품목</th>
                            <th>수량</th>
                            <th>단가 <span style="font-size:13px;">(선택시 부가세 포함)</span></th>
                            <th>공급가액</th>
                            <th>부가세</th>
                            <th>합계</th>
                            <th>비고</th>
                            <th>상태</th>
                            <th>
                                <a class="btn in_btn plus" id="addRemark" title="추가">
                                    <img src="/images/icon/ico-plus.svg" alt="등록 아이콘" />
                                </a>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="item-template-row" style="display:none;">
                            <td><input type="text" name="product_code" readonly/></td>
                            <td>
                                <div class="input-with-button">
                                    <input type="hidden" name="suju_id" />
                                    <input type="text" name="txtProductName" placeholder="코드 또는 품명 입력 후 엔터" autocomplete="off" />
                                    <input type="hidden" name="MaterialGroupName" />
                                    <input type="hidden" name="Material_id" />
                                    <a class="btn in_btn" title="품목 검색" id="btnProductSearch">
                                        <img src="/images/icon/btn-srch-black.svg" alt="검색 아이콘" />
                                    </a>
                                </div>
                            </td>
                            <td><input type="text" name="quantity" placeholder="수량" /></td>
                            <td>
                                <div class="input-with-checkbox">
                                    <input type="text" name="unitPrice" placeholder="단가" />
                                    <input type="hidden" name="originalUnitPrice" />
                                    <input type="checkbox" name="VatIncluded" />
                                </div>
                            </td>
                            <td><input type="text" name="supplyAmount" /></td>
                            <td><input type="text" name="VatAmount" /></td>
                            <td><input type="text" name="totalAmount" /></td>
                            <td><input type="text" name="description" /></td>
                            <td>
                                <input type="hidden" name="State"/>
                                <input type="text" name="suju_StateName" readonly />
                            </td>
                            <td class="al_c item_border">
                                <a class="btn in_btn" title="삭제" onclick="removeItemRow(this)">
                                    <img src="/images/icon/ico-delete.svg" alt="삭제 아이콘" />
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </form>
        </div>
        <!-- ★ 수정 불가 안내문구 견적에 맞게 변경 -->
        <div id="notUpdate" style="display:none;">*수주 확정된 견적은 수정이 불가합니다.</div>
        <div class="popup-button">
            <button type="button" class="btn-popup y_write_auth" id="btnPopSujuSave">저장</button>
            <button type="button" class="btn-popup" id="modal-close-button">닫기</button>
        </div>
    </div>
  </script>

  <!-- ===================== 엑셀 업로드 팝업 템플릿 ===================== -->
  <script type="text/x-tmpl" id="excelUploadTemplate">
    <div class="content_wrap popup" id="div_excel_upload">
        <div class="table-wrap">
            <form id="excelUploadForm">
                <table class="write-table">
                    <colgroup>
                        <col style="width:25%;">
                        <col style="width:75%;">
                    </colgroup>
                    <tbody>
                        <tr>
                            <th style="text-align:center"><label>일자</label></th>
                            <td>
                                <input style="width:300px;" type="date" id="data_date" name="data_date" value="" />
                            </td>
                        </tr>
                        <tr>
                            <th style="text-align:center"><label>첨부파일</label></th>
                            <td>
                                <input style="width:300px; height:44px;" type="file" id="upload_file" name="upload_file"
                                    enctype="multipart/form-data" accept=".xls, .xlsx"/>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </form>
        </div>
        <div class="pt-2">
            <textarea id="upload_message" style="display:none;width:100%;height:150px;"></textarea>
        </div>
        <div class="popup-button">
            <button type="button" class="btn-popup y_write_auth" id="btn_excel_save">저장</button>
            <button type="button" class="btn-popup" id="modal-close-button">닫기</button>
        </div>
    </div>
  </script>
</th:block>

<th:block layout:fragment="scripts">
  <th:block th:replace="/common/multiform_material :: multiform_material"></th:block>
  <th:block th:replace="/common/popup_company :: popup_company"></th:block>
  <th:block th:replace="/common/popup_project :: popup_project"></th:block>

  <script type="text/javascript">

   let isInternalFormatting = false;

   class SujuUploadPage {
    constructor() {
     // ★ 기존 URL 그대로 사용
     this.url = '/api/sales/suju';
     this.grid = null;
     this.$btnEdit   = $('#btnEdit');
     this.$btnAddNew = $('#btnAddNew');
     this.viewData   = new wijmo.collections.CollectionView();
     this.init();
    }

    resetSujuListIndex()  { this.sujuListIndex = 0; }
    nextSujuListIndex()   { return this.sujuListIndex++; }

    init() {
     let _this = this;

     // ─── 그리드 초기화 ─────────────────────────────────────────────
     this.grid = new wijmo.grid.FlexGrid('#theGrid', {
      selectionMode:       wijmo.grid.SelectionMode.Row,
      headersVisibility:   wijmo.grid.HeadersVisibility.Column,
      autoGenerateColumns: false,
      showMarquee: true,
      isReadOnly:  true,
      formatItem: (sender, e) => {
       if (e.panel.cellType === wijmo.grid.CellType.ColumnHeader) {
        e.cell.style.textAlign = 'center';
       }
      },
      columns: [
       { binding: 'CompanyName',  header: '판매처',   width: 150, align: 'center' },
       // ★ 수주일 → 견적일 (binding은 JumunDate 그대로)
       { binding: 'JumunDate',    header: '견적일',   width: 130, align: 'center' },
       // ★ 수주번호 → 견적번호 (binding은 JumunNumber 그대로)
       { binding: 'JumunNumber',  header: '견적번호', width: 150, align: 'center' },
       { binding: 'product_name', header: '제품명',   width: 400 },
       { binding: 'TotalPrice',   header: '총액',     width: 120, align: 'right', format: 'n2' },
       { binding: 'DueDate',      header: '납기일',   width: 130, align: 'center' },
       { binding: 'StateName',    header: '상태',     width: 100, align: 'center' },
       // ★ SujuTypeName, ShipmentStateName, suju_action(견적확정버튼) 컬럼 제거
       { binding: 'Description',  header: '비고',     width: '*' }
      ],
      itemsSource: this.viewData,
     });

     new FlexGridContextMenu(this.grid);
     this.grid.downloadFileName = '견적 내역';

     // ─── 더블클릭 수정 ─────────────────────────────────────────────
     this.grid.hostElement.addEventListener('dblclick', function () {
      if (_this.grid.selectedItems.length === 0) return;
      _this.$btnEdit.trigger('click');
     });

     let nowDate = CommonUtil.getYYYYMMDD();
     let dueDate = CommonUtil.getYYYYMMDD(10);

     // ─── 등록 버튼 ─────────────────────────────────────────────────
     this.$btnAddNew.click(function () {
      _this.resetSujuListIndex();
      let defaultData = {
       id: '',
       mode: 'new',
       JumunDate: nowDate,
       DueDate: dueDate,
      };
      _this.showSujuForm(defaultData);
     });

     // ─── 수정 버튼 ─────────────────────────────────────────────────
     this.$btnEdit.click(function () {
      let selectedItems = _this.grid.selectedItems;
      const it = selectedItems && selectedItems[0];

      if (selectedItems.length === 1) {
       window.selectedGridId = it.id;
       let data = { id: selectedItems[0].id, action: 'detail' };

       let fnsuccess = function (result) {
        result.data['mode'] = 'edit';
        const selected = selectedItems[0];

        if (result.data['SujuType'] === 'estimate') {
         result.data['StateName'] = '견적';
        }
        _this.resetSujuListIndex();
        _this.showSujuForm(result.data);
       };
       AjaxUtil.getAsyncData(_this.url + '/detail', data, fnsuccess);
      } else {
       Alert.alert('', '선택된 데이터가 없습니다.');
      }
     });

     // ─── 삭제 버튼 ─────────────────────────────────────────────────
     $('#btnDelete').click(function () {
      let items = _this.grid.selectedItems;
      if (items.length > 0) {
       Alert.confirm('', '삭제하시겠습니까?',
        function () {
         let id    = items[0].id;
         let state = items[0].State;
         // ★ 견적은 출하 없으므로 ShipmentStateName 빈값 고정
         _this.deleteSujuData(id, state, '');
        },
        function () {}
       );
      } else {
       Alert.alert('', '삭제할 항목을 선택해주세요.', function () { $(this).focus(); });
      }
     });

     $('#keyword').on('keypress', function (e) {
      if (e.keyCode === 13) _this.searchMainData();
     });
    }

    // ─── 팝업 열기 ────────────────────────────────────────────────────
    showSujuForm(data) {
     let _this = this;
     let content  = tmpl('sujuTemplate', data);
     let $content = $(content);

     let modalContainer = (data.mode === 'new')
      ? new PopupDraggable('견적 등록')   // ★ 제목 변경
      : new PopupDraggable('견적 수정');  // ★ 제목 변경

     modalContainer.open({ width: 1300, height: 600, $content });

     let $sujuForm = $content.find('#sujuForm');

     // 판매처 검색
     $content.find('#btnCompanySearch').click(function () {
      let poppage = new PopCompComponent();
      poppage.show(function (items) {
       $content.find('#cboCompany').val(items.id);
       $content.find('#CompanyName').val(items.compname);
      });
     });

     // ★ 수주구분 select 로드 제거 - hidden value='estimate' 고정으로 대체

     setTimeout(() => {
      FormUtil.BindDataSujuForm(data, $sujuForm);
      $content.find('tr:visible').each(function () {
       calculateAmounts($(this), 'unit');
      });
     }, 100);

     // ★ 수주 확정된 견적은 수정 불가 (StateName이 '견적'이 아닐 때)
     if (data.StateName && data.StateName !== '견적') {
      $('#btnPopSujuSave').hide();
      $('#notUpdate').css('margin-top', '10px').show();
      $('.popup-button').css('margin-top', '10px');
     }

     // ─── 저장 버튼 ─────────────────────────────────────────────────
     let $btnPopSujuSave = $('#btnPopSujuSave');
     $btnPopSujuSave.click(function () {
      let formData = FormUtil.extractForm($sujuForm);

      if (!$content.find('#cboCompany').val()) {
       Alert.alert('', '판매처를 선택하세요.'); return;
      }
      if (!formData.Material_id_0) {
       Alert.alert('', '품목을 선택하세요.'); return;
      }

      let index = 0;
      while (true) {
       const materialId = formData[`Material_id_${index}`];
       if (materialId === undefined) break;
       if (materialId && !formData[`quantity_${index}`]) {
        Alert.alert('', `(${index + 1}번째 행) 수량을 입력하세요.`); return;
       }
       index++;
      }

      Alert.confirm('', '저장하시겠습니까?', function () {
       const items = [];
       for (let i = 0; i < page.sujuListIndex; i++) {
        const materialId = formData[`Material_id_${i}`];
        if (!materialId) continue;
        items.push({
         suju_id:           formData[`suju_id_${i}`] || '',
         Material_id:       materialId,
         MaterialGroupName: formData[`MaterialGroupName_${i}`] || '',
         product_code:      formData[`product_code_${i}`] || '',
         txtProductName:    formData[`txtProductName_${i}`] || '',
         quantity:          (formData[`quantity_${i}`] || '0').replace(/,/g, ''),
         unitPrice:         (formData[`unitPrice_${i}`] || '0').replace(/,/g, ''),
         supplyAmount:      (formData[`supplyAmount_${i}`] || '0').replace(/,/g, ''),
         VatAmount:         formData[`VatAmount_${i}`] === '면세' ? '0' : (formData[`VatAmount_${i}`] || '0').replace(/,/g, ''),
         totalAmount:       (formData[`totalAmount_${i}`] || '0').replace(/,/g, ''),
         description:       formData[`description_${i}`] || '',
         VatIncluded:       formData[`VatIncluded_${i}`] === 'on' ? 'Y' : 'N',
         projectHidden:     formData[`projectHidden_${i}`] || '',
         unitPriceChanged: (() => {
          const ori = parseFloat(formData[`originalUnitPrice_${i}`] || '0');
          const cur = parseFloat((formData[`unitPrice_${i}`] || '0').replace(/,/g, ''));
          return ori !== cur;
         })()
        });
       }

       // ★ SujuType: 'estimate' 고정, 나머지 payload는 기존과 동일
       const payload = {
        id:             formData.id,
        JumunDate:      formData.JumunDate,
        DueDate:        formData.DueDate,
        Company_id:     formData.Company_id,
        CompanyName:    formData.CompanyName,
        SujuType:       'estimate',   // ★ 견적 고정
        spjangcd:       formData.spjangcd,
        totalAmountSum: formData.totalAmountSum,
        Description:    formData.Description,
        items:          items
       };

       // ★ 기존 저장 API 그대로 사용
       AjaxUtil.postJsonData(_this.url + '/manual_save', payload, function (res) {
        if (res.success) {
         Notify.success('저장되었습니다.');
         _this.searchMainData();
         modalContainer.close();
        } else {
         Alert.alert('저장 실패', res.message || '알 수 없는 오류');
        }
       });
      });
     });

     // ─── 단가 조회 ────────────────────────────────────────────────
     function tryShowPrice($row) {
      const mat_pk     = $row.find('input[name^="Material_id_"]').val();
      const company_id = $content.find('#cboCompany').val();
      const JumunDate  = $content.find('#JumunDate').val();

      if (mat_pk && company_id && JumunDate) {
       // ★ 기존 단가조회 API 그대로 사용
       AjaxUtil.getAsyncData(
        _this.url + '/readPriceSuju',
        { mat_pk, company_id, JumunDate },
        function (result) {
         if (result?.data?.length > 0) {
          const unitPrice = parseFloat(result.data[0].UnitPrice);
          $row.find('input[name^="unitPrice_"]').val(unitPrice.toLocaleString());
          $row.find('input[name^="originalUnitPrice_"]').val(unitPrice.toLocaleString());
         } else {
          $row.find('input[name^="unitPrice"]').val('0');
          $row.find('input[name^="originalUnitPrice"]').val('0');
         }
         calculateAmounts($row);
        }
       );
      }
     }

     // ─── 금액 계산 ────────────────────────────────────────────────
     function getNumericValue($input) {
      if ($input.length === 0) return '';
      const val = ($input.val() || '').replace(/[^0-9.]/g, '').trim();
      return val ? parseFloat(val) : '';
     }

     function calculateAmounts($row, source = null) {
      if (isInternalFormatting) return;
      isInternalFormatting = true;

      const quantity      = getNumericValue($row.find('input[name^="quantity_"]'));
      const unitPrice     = getNumericValue($row.find('input[name^="unitPrice_"]'));
      const isVatIncluded = $row.find('input[name^="VatIncluded_"]').is(':checked');
      const isVatExempt   = false;

      let supplyAmount     = getNumericValue($row.find('input[name^="supplyAmount_"]'));
      let vatAmount        = getNumericValue($row.find('input[name^="VatAmount_"]'));
      const isSupplyEdited = $row.data('supplyEdited') === true;
      const isVatEdited    = $row.data('vatEdited')    === true;

      if (source === 'unit' && quantity > 0 && unitPrice >= 0) {
       const total = quantity * unitPrice;
       if (!isSupplyEdited || !isVatEdited) {
        if (isVatExempt) {
         supplyAmount = total; vatAmount = 0;
        } else if (isVatIncluded) {
         supplyAmount = Math.round(total / 1.1);
         vatAmount    = total - supplyAmount;
        } else {
         supplyAmount = total;
         vatAmount    = Math.floor(supplyAmount * 0.1);
        }
        if (!isSupplyEdited)
         $row.find('input[name^="supplyAmount_"]').val(supplyAmount === 0 ? '' : supplyAmount.toLocaleString());
        if (!isVatEdited)
         $row.find('input[name^="VatAmount_"]').val(
          vatAmount === 0 ? '' : (isVatExempt ? '면세' : vatAmount.toLocaleString())
         );
       }
      }

      if (!isNaN(supplyAmount) && !isNaN(vatAmount)) {
       const total = supplyAmount + vatAmount;
       $row.find('input[name^="totalAmount_"]').val(total === 0 ? '' : total.toLocaleString());
      }
      if (quantity  !== '') $row.find('input[name^="quantity_"]').val(quantity.toLocaleString());
      if (unitPrice !== '') $row.find('input[name^="unitPrice_"]').val(unitPrice.toLocaleString());

      calculateTotalSum();
      isInternalFormatting = false;
     }

     function calculateTotalSum() {
      let sum = 0;
      $content.find('tr:visible').each(function () {
       const raw = ($(this).find('input[name^="totalAmount_"]').val() || '').replace(/[^0-9.]/g, '').trim();
       if (raw) { const v = parseFloat(raw); if (!isNaN(v)) sum += v; }
      });
      $content.find('#totalAmountSum').val(sum > 0 ? sum.toLocaleString() : '');
     }

     // ─── 입력 이벤트 바인딩 ────────────────────────────────────────
     $content.on('input', 'input[name^="quantity_"], input[name^="unitPrice_"]', function () {
      const $row = $(this).closest('tr');
      $row.removeData('supplyEdited'); $row.removeData('vatEdited');
      calculateAmounts($row, 'unit');
     });
     $content.on('input', 'input[name^="supplyAmount_"]', function () {
      const $row = $(this).closest('tr');
      $row.data('supplyEdited', true);
      calculateAmounts($row);
     });
     $content.on('input', 'input[name^="VatAmount_"]', function () {
      const $row = $(this).closest('tr');
      $row.data('vatEdited', true);
      calculateAmounts($row);
     });
     $content.on('input', 'input[name^="totalAmount_"]', function () { calculateTotalSum(); });
     $content.on('change', 'input[name^="VatIncluded_"]', function () {
      const $row = $(this).closest('tr');
      $(this).val(this.checked ? 'Y' : 'N');
      $row.removeData('supplyEdited'); $row.removeData('vatEdited');
      calculateAmounts($row, 'unit');
     });

     // 숫자 포맷
     $content.on('input',
      'input[name^="quantity_"], input[name^="unitPrice_"], input[name^="supplyAmount_"], input[name^="VatAmount_"], input[name^="totalAmount_"]',
      function () {
       if (isInternalFormatting) return;
       isInternalFormatting = true;
       const $this = $(this);
       let raw = $this.val();
       if ($this.attr('name').startsWith('quantity_')) {
        raw = raw.replace(/[^0-9]/g, '');
        $this.val(raw === '' ? '' : Number(raw).toLocaleString());
       } else {
        raw = raw.replace(/[^0-9.]/g, '').replace(/(\..*)\./g, '$1');
        if (raw === '') { $this.val(''); }
        else {
         const num = parseFloat(raw);
         if (!isNaN(num))
          $this.val(num.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 2 }));
        }
       }
       isInternalFormatting = false;
      }
     );

     // 품목 검색 팝업
     $content.on('click', 'a[title="품목 검색"]', function () {
      const $row = $(this).closest('tr');
      const pop  = new PopMatComponent();
      pop.material_type = 'product,sangpum';
      pop.show(function (item) {
       $row.find('input[name^="txtProductName_"]').val(item.Name);
       $row.find('input[name^="Material_id_"]').val(item.id);
       $row.find('input[name^="product_code_"]').val(item.Code);
       $row.find('input[name^="MaterialGroupName_"]').val(item.group_name);
       tryShowPrice($row);
      });
     });

     // 품목명 엔터 검색
     $content.on('keydown', 'input[name^="txtProductName_"]', function (e) {
      if (e.key !== 'Enter' && e.keyCode !== 13) return;
      e.preventDefault();
      const $field  = $(this);
      const $row    = $field.closest('tr');
      const keyword = $field.val().trim();
      const pop = new PopMatComponent();
      pop.material_type = 'product,sangpum';
      const callback = function (item) {
       $row.find('input[name^="Material_id_"]').val(item.id || '');
       $row.find('input[name^="txtProductName_"]').val(item.Name || '');
       $row.find('input[name^="product_code_"]').val(item.Code || '');
       tryShowPrice($row);
      };
      if (!keyword) { pop.focusAfterClose = $field[0]; pop.show(callback); return; }
      const result = AjaxUtil.getSyncData('/api/popup/search_material', {
       keyword, spjangcd: sessionStorage.getItem('spjangcd')
      });
      const rows = result?.data || [];
      if (rows.length === 1) { callback(rows[0]); }
      else {
       pop.show(callback);
       setTimeout(() => { pop.$keyword.val(keyword); pop.$btnMaterialSearch.trigger('click'); }, 50);
      }
     });

     // 품목명 지우면 코드 초기화
     $content.on('input', 'input[name^="txtProductName_"]', function () {
      const $field = $(this);
      const $row   = $field.closest('tr');
      if ($field.val().trim() === '') {
       $row.find('input[name^="Material_id_"]').val('');
       $row.find('input[name^="product_code_"]').val('');
      }
     });

     // + 버튼: 행 3개 추가
     $content.find('#addRemark').click(function () {
      const $tbody    = $content.find('.item-table tbody');
      const $template = $tbody.find('.item-template-row');
      for (let i = 0; i < 3; i++) {
       const $newRow = $template.clone().removeClass('item-template-row').show();
       const index   = page.nextSujuListIndex();
       $newRow.find('input').each(function () {
        const baseName = $(this).attr('name');
        if (baseName) $(this).attr('name', `${baseName}_${index}`);
       });
       $newRow.find('a[title="삭제"]').attr('id', `btnDelItem_${index}`);
       $tbody.append($newRow);
      }
     });

     // 키보드 포커스 이동
     $content.on('keydown', 'input', function (e) {
      const key = e.key;
      if (!['Enter','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(key)) return;
      e.preventDefault();

      const $input   = $(this);
      const $row     = $input.closest('tr');
      const nameAttr = $input.attr('name') || '';
      const focusOrder = [
       'txtProductName_', 'quantity_', 'unitPrice_',
       'supplyAmount_', 'VatAmount_', 'totalAmount_',
       'project_', 'description_',
      ];
      const currentIndex = focusOrder.findIndex(p => nameAttr.startsWith(p));
      if (currentIndex === -1) return;

      let $nextInput = null;

      if (key === 'ArrowRight' && currentIndex < focusOrder.length - 1)
       $nextInput = $row.find(`input[name^="${focusOrder[currentIndex + 1]}"]`);
      else if (key === 'ArrowLeft' && currentIndex > 0)
       $nextInput = $row.find(`input[name^="${focusOrder[currentIndex - 1]}"]`);

      if (key === 'ArrowDown' || key === 'ArrowUp') {
       const $targetRow = key === 'ArrowDown'
        ? $row.nextAll('tr:visible').first()
        : $row.prevAll('tr:visible').first();
       const allowAutoAdd   = ['txtProductName_', 'description_'];
       const isAllowedField = allowAutoAdd.some(p => nameAttr.startsWith(p));
       if (key === 'ArrowDown' && !$targetRow.length && isAllowedField) {
        $content.find('#addRemark').trigger('click');
        setTimeout(() => {
         const $ni = $content.find('.item-table tbody tr:visible').not('.item-template-row').last().find('input[name^="txtProductName_"]');
         if ($ni.length) $ni.focus().select();
        }, 50);
        return;
       }
       $nextInput = $targetRow.find(`input[name^="${focusOrder[currentIndex]}"]`);
      }

      if (key === 'Enter' && currentIndex < focusOrder.length - 1) {
       $nextInput = $row.find(`input[name^="${focusOrder[currentIndex + 1]}"]`);
      } else if (key === 'Enter' && nameAttr.startsWith('description_')) {
       const $nextRow = $row.nextAll('tr:visible').first();
       if (!$nextRow.length) {
        $content.find('#addRemark').trigger('click');
        setTimeout(() => {
         const $ni = $content.find('.item-table tbody tr:visible').not('.item-template-row').last().find('input[name^="txtProductName_"]');
         if ($ni.length) $ni.focus().select();
        }, 50);
        return;
       }
       $nextInput = $nextRow.find('input[name^="txtProductName_"]');
      }

      if ($nextInput && $nextInput.length) $nextInput.focus().select();
     });
    }

    // ─── 삭제 ─────────────────────────────────────────────────────────
    deleteSujuData(id, state, ShipmentStateName) {
     let _this = this;
     // ★ 기존 삭제 API 그대로 사용 (ShipmentStateName은 '' 고정으로 전달)
     AjaxUtil.postAsyncData(
      _this.url + '/delete',
      { id, State: state, ShipmentStateName: ShipmentStateName },
      function (res) {
       if (res.success) {
        Notify.success('삭제되었습니다.');
        _this.searchMainData();
       } else {
        Alert.alert('', res.message);
       }
      }
     );
    }

    // ─── 목록 조회 ─────────────────────────────────────────────────────
    searchMainData() {
     let _this = this;
     // ★ 기존 조회 API + suju_type=estimate 파라미터 추가로 견적만 필터링
     AjaxUtil.getAsyncData(
      _this.url + '/read',
      {
       date_kind: $('#cboDateKind').val(),
       start:     $('#srchStartDt').val(),
       end:       $('#srchEndDt').val(),
       suju_type: 'estimate' ,  // ★ 견적만 조회
       spjangcd:  sessionStorage.getItem('spjangcd')
      },
      function (result) {
       if (result != null) {
        _this.viewData.sourceCollection = result.data;
        if (window.selectedGridId) {
         GridUtil.selectRowById(_this.grid, window.selectedGridId);
         window.selectedGridId = null;
        }
       }
      }
     );
    }

    // ─── 엑셀 업로드 팝업 ─────────────────────────────────────────────
    showPopupExcelUpload(data) {
     let _this = this;
     let $content = $(tmpl('excelUploadTemplate', data));
     $content.find('#data_date').val(data.data_date);

     let modalContainer = new PopupDraggable('엑셀 업로드');
     modalContainer.open({ width: 440, height: 220, $content });

     $content.find('#btn_excel_save').on('click', function () {
      Alert.confirm('', '저장하시겠습니까?',
       function () { _this.saveSujuBulkData($content.find('#excelUploadForm'), modalContainer); },
       function () {}
      );
     });
    }

    saveSujuBulkData($form, modalContainer) {
     let _this = this;
     let formData = new FormData($form[0]);
     formData['data_date'] = $('#srchStartDt').val();
     formData.append('uploadfile', $('#upload_file')[0].files[0].name);
     // ★ 기존 엑셀 업로드 API 그대로 사용
     let result = AjaxUtil.postFileSyncData(_this.url + '/upload_save', formData);
     if (result) {
      if (result.success) { Notify.success('저장되었습니다.'); _this.searchMainData(); modalContainer.close(); }
      else { Alert.alert('', result.message); }
     }
    }

    downloadExcelForm() {
     // ★ 파일명만 견적으로 변경
     let fileName = '견적업로드양식.xlsx';
     AjaxUtil.downloadFile('/api/files/mes_form?file_name=' + fileName, fileName);
    }
   }

   // ─── 행 삭제 함수 ─────────────────────────────────────────────────────
   function removeItemRow(el) {
    const $tbody     = $(el).closest('tbody');
    const $rows      = $tbody.find('tr:not(.item-template-row)');
    const $targetRow = $(el).closest('tr');

    if ($rows.length <= 3) {
     const hasData = $targetRow.find('input[type="text"], input[type="number"]')
     .filter(function () { return $(this).val().trim() !== ''; }).length > 0;
     if (hasData) {
      $targetRow.find('input[type="text"], input[type="number"], input[type="hidden"]').val('');
     }
     return;
    }
    $targetRow.remove();
   }

   // ─── 페이지 초기화 ────────────────────────────────────────────────────
   let page = null;

   $(document).ready(function () {
    page = new SujuUploadPage();

    $('#srchStartDt').val(CommonUtil.getYYYYMMDD(-7));
    $('#srchEndDt').val(CommonUtil.getYYYYMMDD());

    page.searchMainData();

    $('#btnSearch').click(function () {
     page.searchMainData();
    });
    $('#btnDownloadTemplate').click(function () {
     page.downloadExcelForm();
    });
    $('#btnShowUpload').click(function () {
     page.showPopupExcelUpload({id: '', data_date: CommonUtil.getYYYYMMDD()});
    });
   });

  </script>
</th:block>
