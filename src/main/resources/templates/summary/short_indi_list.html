        init() {
            let _this = this;

            this.grid = new wijmo.grid.FlexGrid('#theGrid', {
                selectionMode: wijmo.grid.SelectionMode.Row,
                headersVisibility: wijmo.grid.HeadersVisibility.Column,
                allowSorting: wijmo.grid.AllowSorting.MultiColumn,
                allowMerging: wijmo.grid.AllowMerging.Cells,  //셀 병합
                autoGenerateColumns: false,
                showMarquee: true,
                isReadOnly: true,
                frozenColumns: 4,
                formatItem: (sender, e) => {
                    if (e.panel.cellType === wijmo.grid.CellType.ColumnHeader) {
                        e.cell.style.textAlign = 'center';
                    }
                    if (e.panel.cellType === wijmo.grid.CellType.Cell) {
                        let item = sender.rows[e.row].dataItem;
                        let colName = sender.columns[e.col].binding;
                        // 스타일 전체 초기화
                        e.cell.style.backgroundColor = '';
                        e.cell.style.fontWeight = '';
                        e.cell.style.color = '';
                        e.cell.style.borderBottom = '';
                        e.cell.style.textAlign = '';
                        e.cell.style.justifyContent = '';

                        if (!item) return;

                        // 납기일수 행은 숫자 소수점 1자리로 표시
                        if (item._type === '납기일수') {
                            let col = sender.columns[e.col];
                            if (col.binding && col.binding.startsWith('mon_')) {
                                let val = item[col.binding];
                                if (val !== null && val !== undefined && val !== '') {
                                    e.cell.textContent = parseFloat(val).toFixed(1);
                                }
                            }
                        }

                        // 구분별 배경색
                        if (item._type === '수주일') {
                            e.cell.style.backgroundColor = '#f0f7ff';
                        } else if (item._type === '출고일') {
                            e.cell.style.backgroundColor = '#f0fff4';
                        } else if (item._type === '납기일수') {
                            e.cell.style.borderBottom = '2px solid #ddd';
                        }

                        // 평균행 강조

                            e.cell.style.fontWeight = 'bold';
                            e.cell.style.color = '#1a6496';
                            if (item._type === '수주일')   e.cell.style.backgroundColor = '#cce3f7';

                            if (item._type === '납기일수') e.cell.style.backgroundColor = '#eaf4fb';
                        }
                    }

                        binding: `mon_${i + 1}`,
                        header: `${i + 1}월`,

                        align: 'center',
                        allowSorting: false
                    }))

            });
            new FlexGridContextMenu(this.grid);
            this.grid.downloadFileName = '납기 단축 지표';
            this.grid.mergeManager = new CustomMergeManager(this.grid);
        }

            const calculateLeadTime = (jumStr, shipStr) => {
                if (!jumStr || !shipStr) return null;
                const [jM, jD] = jumStr.split('/').map(Number);
                const [sM, sD] = shipStr.split('/').map(Number);

                // 2024(윤년) 대신 2026(평년)으로 설정하면 2월이 28일까지로 계산됩니다.
                const jDate = new Date(2026, jM - 1, jD);
                const sDate = new Date(2026, sM - 1, sD);

                return Math.floor((sDate - jDate) / (1000 * 60 * 60 * 24)) + 1;
            };

    class CustomMergeManager extends wijmo.grid.MergeManager {
        getMergedRange(panel, row, col, clip = true) {
            if (panel.cellType !== wijmo.grid.CellType.Cell) {
                return super.getMergedRange(panel, row, col, clip);
            }

            const colName = panel.columns[col].binding;
            if (colName === 'standard1' || colName === 'unit_name') {
                const matNameCol = panel.columns.getColumn('mat_name').index;
                const val = panel.getCellData(row, col, false);
                const matName = panel.getCellData(row, matNameCol, false);

                let rng = new wijmo.grid.CellRange(row, col);

                // 위로 병합
                while (rng.row > 0) {
                    let prevVal = panel.getCellData(rng.row - 1, col, false);
                    let prevMatName = panel.getCellData(rng.row - 1, matNameCol, false);
                    if (prevVal !== val || prevMatName !== matName) break;
                    rng.row--;
                }

                // 아래로 병합
                while (rng.row2 < panel.rows.length - 1) {
                    let nextVal = panel.getCellData(rng.row2 + 1, col, false);
                    let nextMatName = panel.getCellData(rng.row2 + 1, matNameCol, false);
                    if (nextVal !== val || nextMatName !== matName) break;
                    rng.row2++;
                }

                return rng.isSingleCell ? null : rng;
            }

            return super.getMergedRange(panel, row, col, clip);
        }
    }
